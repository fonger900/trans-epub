# trans-epub configuration example
# Copy to: ./trans-epub/config.toml (project-local)
#      or: ~/.config/trans-epub/config.toml (user-global)
#
# All values optional — defaults shown below.
# Override with TRANS_EPUB_* environment variables.

[defaults]
engine = "auto"       # Default engine (auto, azure, alibaba, gemini, deepseek, google, deepl)
threads = 4           # Concurrent translation threads
creativity = 0.3      # LLM creativity/temperature (0.0-1.0)


# ── Authentication ────────────────────────────────────────────────────────────
# API keys are set via environment variables ONLY (in .env file):
#
#   AZURE_TRANSLATOR_KEY    - Azure Cognitive Translator
#   GEMINI_API_KEY          - Google Gemini
#   DEEPSEEK_API_KEY        - DeepSeek
#   DASHSCOPE_API_KEY       - Alibaba DashScope (Qwen)
#   GOOGLE_TRANSLATE_API_KEY - Google Cloud Translation
#   DEEPL_API_KEY           - DeepL
#
# They are NOT stored in this config file for security reasons.


# ── Rate Limiting ──────────────────────────────────────────────────────────────
# Each engine uses proactive rate limiting to avoid 429 errors:
#
#   - Gemini: 15 RPM  (free tier)
#   - DeepSeek: 10 RPM
#   - Alibaba: 10 RPM
#   - Azure/Google/DeepL: per-provider limits
#
# The limiter blocks threads before API calls to stay under the limit.
# No configuration needed — it just works.


# ── Glossary ───────────────────────────────────────────────────────────────────
# Character pronouns and terminology consistency:
#
#   Auto-detected: .trans-epub/glossary.toml or ~/.config/trans-epub/glossary.toml
#   Explicit path:  --glossary path/to/glossary.toml
#
# See .trans-epub/glossary.example.toml for format details.
